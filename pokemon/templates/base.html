<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokéView - {% block title %}Inicio{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <nav class="bg-red-600 text-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <a href="{% url 'pokemon_list' %}" class="text-2xl font-bold tracking-wide">PokéView</a>
                <div class="flex items-center gap-4">
                    <a href="{% url 'pokemon_list' %}" class="hover:text-yellow-300 transition">Inicio</a>
                    {% if user.is_authenticated %}
                        <span class="text-sm">{{ user.username }}</span>
                        <a href="{% url 'logout' %}" class="bg-white text-red-600 px-4 py-2 rounded-lg font-semibold hover:bg-yellow-300 transition">Cerrar Sesión</a>
                    {% else %}
                        <a href="{% url 'login' %}" class="hover:text-yellow-300 transition">Iniciar Sesión</a>
                        <a href="{% url 'register' %}" class="bg-white text-red-600 px-4 py-2 rounded-lg font-semibold hover:bg-yellow-300 transition">Registrarse</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>
    <main class="max-w-7xl mx-auto px-4 py-8">
        {% if messages %}
            <div class="mb-6">
                {% for message in messages %}
                    <div class="p-4 rounded-lg {% if message.tags == 'error' %}bg-red-100 text-red-700{% else %}bg-green-100 text-green-700{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}
        {% block content %}{% endblock %}
    </main>
</body>
</html>
