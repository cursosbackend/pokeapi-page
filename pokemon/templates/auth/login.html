{% extends 'base.html' %}
{% block title %}Iniciar Sesión{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-12">
    <div class="bg-white rounded-xl shadow-lg p-8">
        <h1 class="text-2xl font-bold text-center mb-6">Iniciar Sesión</h1>
        <form method="POST">
            {% csrf_token %}
            <div class="mb-4">
                <label class="block text-gray-700 font-semibold mb-1">Usuario</label>
                <input type="text" name="username" required
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500">
            </div>
            <div class="mb-6">
                <label class="block text-gray-700 font-semibold mb-1">Contraseña</label>
                <input type="password" name="password" required
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500">
            </div>
            <button type="submit" class="w-full bg-red-600 text-white py-2 rounded-lg font-semibold hover:bg-red-700 transition">
                Iniciar Sesión
            </button>
        </form>
        <p class="mt-4 text-center text-gray-600">
            ¿No tienes cuenta?
            <a href="{% url 'register' %}" class="text-red-600 font-semibold hover:underline">Regístrate</a>
        </p>
    </div>
</div>
{% endblock %}
